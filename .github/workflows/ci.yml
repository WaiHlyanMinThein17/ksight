name: CI

# Build and lint on every push and PR. Note: this pipeline BUILDS and lints
# the project (including cross-compiling the eBPF object via aya-build) but
# does NOT load or run the eBPF program -- loading requires a privileged
# kernel with BPF support, which GitHub-hosted runners don't reliably provide.
# Runtime verification is done manually on a real kernel (see README).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Nightly is required to build the eBPF crate (build-std=core for the
      # bpfel-unknown-none target). rust-src provides core's source for that.
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, clippy, rustfmt

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # bpf-linker links the eBPF object. Needs LLVM, which ubuntu-latest has.
      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Build
        run: cargo build --verbose

      # Lint host-space crates. The eBPF crate and the generated vmlinux.rs
      # are excluded from default clippy here to avoid generated-code noise;
      # build already compiles them.
      - name: Clippy
        run: cargo clippy --workspace --exclude ksight-ebpf -- -D warnings
      - name: Test
        run: cargo test --workspace --exclude ksight-ebpf

      # Check formatting, but skip the generated vmlinux.rs (rustfmt::skip
      # in the source handles it, but we also don't fmt-check generated code).
      - name: Format check
        run: cargo fmt --all --check
